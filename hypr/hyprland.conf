source = colors.conf
source = monitors.conf


# MY PROGRAMS

$terminal = ghostty
$fileManager = nautilus --new-window
$menu = walker
$browser = flatpak run app.zen_browser.zen


# AUTOSTART

# Plugins
exec-once = hyprpm reload

# UI
exec-once = waybar        # Bar
exec-once = swaync        # Notification center
exec-once = hyprpaper     # Wallpaper
exec-once = hyprsunset    # Night light

# Helpers
exec-once = elephant
exec-once = walker --gapplication-service
exec-once = systemctl --user start hyprpolkitagent
exec-once = swayosd-server

# Favorite apps
exec-once = steam -silent
exec-once = vesktop
exec-once = spotify-launcher

# Update notifier
exec-once = ~/.local/bin/update-notifier


# ENVIRONMENT VARIABLES

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots

# Ghostty dead keys
# https://github.com/ghostty-org/ghostty/discussions/8899#discussioncomment-14717979
env = GTK_IM_MODULE,simple


# LOOK AND FEEL

general {
    gaps_in = 4
    gaps_out = 16

    border_size = 2

    col.active_border = $primary
    col.inactive_border = $surface_bright

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 24
        render_power = 2
        color = rgba(00000050)
        color_inactive = rgba(00000040)
        offset = 0, 2
    }

    blur {
        enabled = true
        size = 3
        passes = 3

        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     4,     easeOutQuint, slide
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}


# INPUT

input {
    # Keyboard
    kb_layout = se
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # Mouse
    follow_mouse = 2
    sensitivity = 0
}


# KEYBINDINGS

$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
# bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, L, exec, hyprlock

# Hyprshot
bind = $mainMod, P, exec, hyprshot -m region            # Region
bind = $mainMod SHIFT, P, exec, hyprshot -m output      # Monitor
bind = $mainMod SHIFT ALT, P, exec, hyprshot -m window  # Window

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Swap windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5
bind = $mainMod, 6, split-workspace, 6
bind = $mainMod, 7, split-workspace, 7
bind = $mainMod, 8, split-workspace, 8
bind = $mainMod, 9, split-workspace, 9
bind = $mainMod, 0, split-workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5
bind = $mainMod SHIFT, 6, split-movetoworkspace, 6
bind = $mainMod SHIFT, 7, split-movetoworkspace, 7
bind = $mainMod SHIFT, 8, split-movetoworkspace, 8
bind = $mainMod SHIFT, 9, split-movetoworkspace, 9
bind = $mainMod SHIFT, 0, split-movetoworkspace, 10

# Switch next/prev workspace with mainMod + ALT + arrow keys
bind = $mainMod ALT, left, split-workspace, -1
bind = $mainMod ALT, right, split-workspace, +1

# Move active window to next/prev workspace with mainMod + SHIFT + ALT + arrow keys
bind = $mainMod SHIFT ALT, left, split-movetoworkspace, -1
bind = $mainMod SHIFT ALT, right, split-movetoworkspace, +1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Brightness controls
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# Volume controls
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

# Media controls
bindl = , XF86AudioNext, exec, swayosd-client --playerctl next
bindl = , XF86AudioPause, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioPrev, exec, swayosd-client --playerctl previous

# Caps lock
bind = , caps, exec, swayosd-client --caps-lock


# WINDOWS AND WORKSPACES

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Default workspaces
windowrule = match:class vesktop, workspace 6 silent
windowrule = match:class Spotify, workspace 7 silent

# Float
windowrule = match:class org.gnome.Calculator, float on

# Picture-in-Picture
windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, keep_aspect_ratio on
windowrule = match:title Picture-in-Picture, decorate off

# Persistent size
windowrule = match:class .*, persistent_size on

# Blur Waybar
layerrule = blur on, match:namespace waybar

# Hyprpicker fix
# https://github.com/Gustash/Hyprshot/issues/60#issuecomment-3698826145
layerrule = match:class selector, no_anim on


# PLUGINS

plugin:split-monitor-workspaces:count = 5
plugin:split-monitor-workspaces:keep_focused = 1
plugin:split-monitor-workspaces:enable_wrapping = 0
