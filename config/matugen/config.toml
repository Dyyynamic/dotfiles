[config]

[config.wallpaper]
command = '''
awww img "{{ image }}" \
--transition-fps 180 \
--transition-duration 1 \
--transition-type center
'''
set = true

[templates.hyprland]
input_path = '~/.config/matugen/templates/hyprland-colors.conf'
output_path = '~/.config/hypr/colors.conf'
post_hook = 'hyprctl reload --quiet'

[templates.ghostty]
input_path = '~/.config/matugen/templates/ghostty'
output_path = '~/.config/ghostty/themes/Matugen'
post_hook = 'pkill -SIGUSR2 ghostty'

[templates.swayosd]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/swayosd/colors.css'
post_hook = 'pkill swayosd-server; hyprctl dispatch exec swayosd-server'

[templates.walker]
input_path = '~/.config/matugen/templates/colors.css'
output_path = '~/.config/walker/themes/Matugen/colors.css'

[templates.gtk3]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-3.0/colors.css'
post_hook = '''
gsettings set org.gnome.desktop.interface gtk-theme "";
gsettings set org.gnome.desktop.interface gtk-theme adw-gtk3-{{mode}}
'''

[templates.gtk4]
input_path = '~/.config/matugen/templates/gtk-colors.css'
output_path = '~/.config/gtk-4.0/colors.css'
post_hook = 'pkill nautilus || true'

[templates.qt5ct]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt5ct/colors/matugen.conf'

[templates.qt6ct]
input_path = '~/.config/matugen/templates/qtct-colors.conf'
output_path = '~/.config/qt6ct/colors/matugen.conf'

[templates.zed]
input_path = '~/.config/matugen/templates/zed-colors.json'
output_path = '~/.config/zed/themes/matugen.json'

[templates.quickshell]
input_path = '~/.config/matugen/templates/quickshell.json'
output_path = '~/.local/state/quickshell/generated/colors.json'

# Scripts

[templates.papirus]
input_path = '/dev/null'
output_path = '/dev/null'
post_hook = '~/.local/bin/papirus-matugen "{{colors.primary.default.hex}}" &'

[templates.tapo]
input_path = '/dev/null'
output_path = '/dev/null'
post_hook = '''
tapo color \
"{{colors.primary.default.red}}" \
"{{colors.primary.default.green}}" \
"{{colors.primary.default.blue}}" &
'''
