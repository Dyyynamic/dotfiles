source = colors.conf
source = env.conf

general {
    ignore_empty_input = true
}

background {
    path = $image
    blur_passes = 3
}

label {
    monitor = $main_monitor

    text = cmd[update:1000] echo "<b>$(date '+%A, %b %d')</b>"
    color = $on_surface
    font_size = 24
    font_family = NotoSans Nerd Font Propo

    position = 0, -140
    valign = top
}

label {
    monitor = $main_monitor

    text = <b>$TIME</b>
    color = $on_surface
    font_size = 112
    font_family = NotoSans Nerd Font Propo

    position = 0, -180
    valign = top
}

image {
    monitor = $main_monitor

    path = ~/.dotfiles/assets/avatar.png
    size = 96
    rounding = -1
    border_size = 0

    position = 0, 220
    valign = bottom
}

label {
    monitor = $main_monitor

    text = <b>$USER</b>
    color = $on_surface
    font_size = 14
    font_family = NotokSans Nerd Font Propo

    position = 0, 180
    valign = bottom
}

input-field {
    monitor = $main_monitor

    size = 280, 40
    outline_thickness = 1
    dots_spacing = 0.35
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = $on_surface
    fade_on_empty = false
    placeholder_text = <span foreground="white">Enter Password</span>
    check_color = rgba(0, 0, 0, 0)
    fail_color = rgba(0, 0, 0, 0)
    fail_text = <span foreground="white">Incorrect password</span>

    position = 0, 110
    valign = bottom
}

animations {
    animation = inputFieldDots, 0, 0, default
}
