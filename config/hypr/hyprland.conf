source = colors.conf
source = monitors.conf
source = default_apps.conf
source = env.conf


# ENVIRONMENT VARIABLES

env = PATH, $HOME/.local/bin:$PATH
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = HYPRSHOT_DIR, $HOME/Pictures/Screenshots
env = QT_QPA_PLATFORMTHEME, qt6ct
env = SSH_AUTH_SOCK, $XDG_RUNTIME_DIR/gcr/ssh

# Ghostty dead keys
# https://github.com/ghostty-org/ghostty/discussions/8899#discussioncomment-14717979
env = GTK_IM_MODULE, simple


# MY PROGRAMS

$terminal = ghostty
$fileManager = nautilus --new-window
$menu = walker
$browser = zen-browser


# AUTOSTART

# Plugins
exec-once = hyprpm reload

# UI
exec-once = waybar        # Bar
exec-once = swaync        # Notification center
exec-once = swww-daemon   # Wallpaper
exec-once = hyprsunset    # Night light

# Helpers
exec-once = elephant
exec-once = walker --gapplication-service
exec-once = systemctl --user start hyprpolkitagent
exec-once = swayosd-server
exec-once = playerctld daemon

# Update notifier
exec-once = update-notifier

# Keyring
# https://wiki.archlinux.org/title/GNOME/Keyring#Using_gnome-keyring-daemon_outside_desktop_environments_(KDE,_GNOME,_XFCE,_...)
exec-once = dbus-update-activation-environment DISPLAY XAUTHORITY WAYLAND_DISPLAY
exec-once = gnome-keyring-daemon --start --components=secrets


# LOOK AND FEEL

general {
    gaps_in = 4
    gaps_out = 16

    border_size = 2

    col.active_border = $primary
    col.inactive_border = $surface_bright

    resize_on_border = true
}

decoration {
    rounding = 12

    shadow {
        range = 24
        render_power = 2
        color = rgba(00000050)
        color_inactive = rgba(00000040)
        offset = 0, 2
    }

    blur {
        size = 3
        passes = 3
    }
}

animations {
    enabled = true

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     4,     easeOutQuint, slide
    animation = zoomFactor,    1,     7,     quick
}

dwindle {
    preserve_split = true
}

misc {
    focus_on_activate = true
}


# INPUT

input {
    # Keyboard
    kb_layout = se

    # Mouse
    follow_mouse = 2
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace


# KEYBINDINGS

$mainMod = SUPER
$osd = swayosd-client --monitor $MAIN_MONITOR

bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod SHIFT, B, exec, $browser --private-window
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, J, layoutmsg, togglesplit
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, I, exec, hyprpicker -a

# Hyprshot
bind = $mainMod, P, exec, hyprshot -m region            # Region
bind = $mainMod SHIFT, P, exec, hyprshot -m output      # Monitor
bind = $mainMod ALT, P, exec, hyprshot -m window        # Window

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, left, bringactivetotop
bind = $mainMod, right, movefocus, r
bind = $mainMod, right, bringactivetotop
bind = $mainMod, up, movefocus, u
bind = $mainMod, up, bringactivetotop
bind = $mainMod, down, movefocus, d
bind = $mainMod, down, bringactivetotop

# Switch between tiled and floating layers with mainMod + Tab
bind = $mainMod, Tab, exec, \
    ($(hyprctl activewindow -j | jq '.floating') && \
    hyprctl dispatch cyclenext tiled || \
    hyprctl dispatch cyclenext floating) && \
    hyprctl dispatch bringactivetotop

# Swap windows with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Switch workspaces with mainMod + [1-5]
bind = $mainMod, 1, split-workspace, 1
bind = $mainMod, 2, split-workspace, 2
bind = $mainMod, 3, split-workspace, 3
bind = $mainMod, 4, split-workspace, 4
bind = $mainMod, 5, split-workspace, 5

# Move active window to a workspace with mainMod + SHIFT + [1-5]
bind = $mainMod SHIFT, 1, split-movetoworkspace, 1
bind = $mainMod SHIFT, 2, split-movetoworkspace, 2
bind = $mainMod SHIFT, 3, split-movetoworkspace, 3
bind = $mainMod SHIFT, 4, split-movetoworkspace, 4
bind = $mainMod SHIFT, 5, split-movetoworkspace, 5

# Switch next/prev workspace with mainMod + ALT + arrow keys
bind = $mainMod ALT, left, split-workspace, -1
bind = $mainMod ALT, right, split-workspace, +1

# Move active window to next/prev workspace with mainMod + SHIFT + ALT + arrow keys
bind = $mainMod SHIFT ALT, left, split-movetoworkspace, -1
bind = $mainMod SHIFT ALT, right, split-movetoworkspace, +1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, split-workspace, -1
bind = $mainMod, mouse_up, split-workspace, +1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Brightness controls
bindel = , XF86MonBrightnessUp, exec, $osd --brightness raise
bindel = , XF86MonBrightnessDown, exec, $osd --brightness lower

# Volume controls
bindel = , XF86AudioRaiseVolume, exec, $osd --output-volume raise
bindel = , XF86AudioLowerVolume, exec, $osd --output-volume lower
bindel = , XF86AudioMute, exec, $osd --output-volume mute-toggle
bindel = , XF86AudioMicMute, exec, $osd --input-volume mute-toggle

# Media controls
bindl = , XF86AudioNext, exec, mediactl next
bindl = , XF86AudioPause, exec, mediactl play-pause
bindl = , XF86AudioPlay, exec, mediactl play-pause
bindl = , XF86AudioPrev, exec, mediactl previous

bindl = $mainMod, Comma, exec, mediactl previous
bindl = $mainMod, Period, exec, mediactl play-pause
bindl = $mainMod, Minus, exec, mediactl next

bindel = $mainMod SHIFT, Comma, exec, mediactl volume 0.05-
bindel = $mainMod SHIFT, Minus, exec, mediactl volume 0.05+

# Caps lock
bind = CAPS, Caps_Lock, exec, $osd --caps-lock


# WINDOWS AND WORKSPACES

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Float
windowrule = match:class org.gnome.Calculator, float on
windowrule = match:class steam, match:title Friends List, float on

# Picture-in-Picture
windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, keep_aspect_ratio on
windowrule = match:title Picture-in-Picture, decorate off

# Persistent size
windowrule = match:class .*, persistent_size on

# Hyprshot fix
# https://github.com/Gustash/Hyprshot/issues/60#issuecomment-3698826145
layerrule = match:namespace selection, no_anim on

# PLUGINS

plugin:split-monitor-workspaces:count = 5
plugin:split-monitor-workspaces:keep_focused = 1
plugin:split-monitor-workspaces:enable_wrapping = 0
